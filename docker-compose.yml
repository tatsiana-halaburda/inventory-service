# Compose reads `.env` next to this file for ${VAR} substitution. Copy `.env.example` → `.env` and fill values.

services:
  inventory:
    platform: linux/amd64
    build: .
    command: uvicorn services.inventory.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      DB_SERVER: ${DB_SERVER:-}
      DB_DATABASE: ${DB_DATABASE:-}
      DB_USERNAME: ${DB_USERNAME:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      AZURE_SQL_CONNECTION_STRING: ${AZURE_SQL_CONNECTION_STRING:-}
      DB_ODBC_DRIVER: ${DB_ODBC_DRIVER:-ODBC Driver 18 for SQL Server}
      AZURE_SERVICEBUS_LISTEN_CONNECTION_STRING: ${AZURE_SERVICEBUS_LISTEN_CONNECTION_STRING:-}
      AZURE_SERVICEBUS_QUEUE_NAME: ${AZURE_SERVICEBUS_QUEUE_NAME:-}
      AZURE_SERVICEBUS_POLL_INTERVAL_SECONDS: ${AZURE_SERVICEBUS_POLL_INTERVAL_SECONDS:-5}
